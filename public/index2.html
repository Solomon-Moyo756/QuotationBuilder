<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Quotation Builder By Moyozen — PDF</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        body {
            font-family: Inter, Arial, sans-serif;
            background: #f4f6f8;
            padding: 28px
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            max-width: 920px;
            margin: 16px auto;
            box-shadow: 0 14px 30px rgba(20, 25, 30, 0.06)
        }

        h1 {
            margin: 0;
            font-size: 20px
        }

        .row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px
        }

        .col {
            flex: 1 1 200px;
            min-width: 150px
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #e6e9ee
        }

        button {
            flex: 1 1 100px;
            min-width: 100px;
            margin-top: 6px
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            display: block;
            overflow-x: auto
        }

        th,
        td {
            white-space: nowrap
        }

        button {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer
        }

        .muted {
            color: #666;
            font-size: 13px
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: #333
        }

        .debug {
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 8px;
            background: #fafafa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee
        }

        label.small {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 6px
        }

        #logoPreview {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: none;
            margin: 0 auto;
            /* centers horizontally */
            padding: 4px;
            /* optional: some breathing space */
            box-sizing: border-box;
        }

        @media (max-width:480px) {
            .row {
                flex-direction: column
            }

            .col {
                min-width: 100%
            }

            button {
                width: 100%;
                margin-top: 8px
            }

            #items {
                font-size: 14px
            }
        }

        /* PDF template styles (keep them here so the generated HTML looks the same) */
        .pdf-wrap {
            font-family: Arial, Helvetica, sans-serif;
            color: #222;
            padding: 28px;
        }

        .pdf-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 18px;
        }

        .pdf-company {
            font-size: 22px;
            color: #2C3E50;
            font-weight: 700;
        }

        .pdf-contact {
            font-size: 12px;
            color: #2C3E50;
        }

        .pdf-client {
            background: #fbfdff;
            padding: 10px;
            border: 1px solid #eef6fb;
            border-radius: 6px;
            margin-bottom: 16px;
        }

        .pdf-title {
            font-size: 20px;
            font-weight: 700;
            margin: 8px 0 16px;
        }

        .pdf-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 8px;
            font-size: 12px;
        }

        .pdf-table th {
            background: #2c3e50;
            color: #fff;
            padding: 8px;
            text-align: left;
        }

        .pdf-table td {
            padding: 8px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
        }

        .pdf-grand {
            background: #E9E9E9;
            font-weight: 700;
            font-size: 16px;
            padding: 8px;
        }

        .pdf-footer {
            margin-top: 20px;
            font-size: 12px;
            color: #444;
        }

        .pdf-brand {
            text-align: center;
            color: #888;
            font-style: italic;
            margin-top: 24px;
            font-size: 11px;
        }

        .pdf-accept {
            margin-top: 22px;
        }

        .logo-img {
            max-width: 240px;
            max-height: 80px;
            object-fit: contain;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>Build your Quotation</h1>
        <p class="muted">fill in this beautiful form to create your quotation in a few seconds</p>

        <div class="row">
            <div class="col"><input id="company" type="text" placeholder="Company name" value="Moyo Zen Construction" />
            </div>
            <div style="width:220px"><input id="date" type="text" placeholder="Date (optional - auto generated)" />
            </div>
            <div style="width:220px"><input id="quoteNo" type="text" placeholder="Quote No (optional)" /></div>
        </div>

        <div class="row" style="margin-top:8px">
            <div class="col">
                <label class="small">Company Phone</label>
                <input id="companyPhone" type="text" placeholder="e.g. 079 684 8598" value="079 684 8598" />
            </div>
            <div class="col">
                <label class="small">Company Email</label>
                <input id="companyEmail" type="text" placeholder="e.g. info@moyozen.co.za" value="info@moyozen.co.za" />
            </div>
        </div>

        <div style="margin-top:12px; display:flex; gap:12px; align-items:center;">
            <div style="flex:1">
                <label class="small">Company Logo (optional) - i.e your image size will affect your output</label>
                <input id="logoFile" type="file" accept="image/*" />
            </div>
            <div
                style="width: 300px; height: 100px; border: 1px dashed #ccc; background:#f9f9f9; margin-top:6px; display:flex; align-items:center; justify-content:center;">
                <img id="logoPreview" src="" alt="logo preview" />
            </div>
        </div>

        <div style="margin-top:14px; border-radius:8px; padding:10px; background:#fbfdff; border:1px solid #eef6fb">
            <div style="display:flex; gap:12px;">
                <div style="flex:1">
                    <label class="small">Client Name</label>
                    <input id="clientName" type="text" placeholder="Client full name or company" />
                </div>
                <div style="flex:1">
                    <label class="small">Client Phone / Email</label>
                    <input id="clientContact" type="text" placeholder="Phone or email" />
                </div>
            </div>
            <div style="margin-top:8px">
                <label class="small">Client Address</label>
                <input id="clientAddress" type="text" placeholder="Client address line" />
            </div>
        </div>

        <table id="items" aria-label="items">
            <tr>
                <th style="width:46%">Description</th>
                <th style="width:12%">Quantity</th>
                <th style="width:12%">Measure</th>
                <th style="width:12%">Price</th>
            </tr>
        </table>

        <div style="display:flex; gap:10px; margin-top:14px">
            <button id="addRowBtn">Add Item</button>
            <button id="autoTestBtn">Auto Test</button>
            <button id="generateBtn">Generate Quote</button>
        </div>

        <div id="status" class="status">Status: ready</div>
        <div id="debug" class="debug" style="display:none"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script>
        (async function main() {
            const statusEl = document.getElementById('status');
            const debugEl = document.getElementById('debug');
            const logoFileInput = document.getElementById('logoFile');
            const logoPreview = document.getElementById('logoPreview');
            const setStatus = t => { statusEl.textContent = 'Status: ' + t; console.log('[STATUS]', t); };
            const showDebug = t => { debugEl.style.display = 'block'; debugEl.textContent = t; console.log('[DEBUG]', t); };

            // helpers
            const $ = id => document.getElementById(id);
            const formatCurrency = v => `R${Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            function addRow() {
                const table = $('items');
                const row = table.insertRow();
                row.innerHTML = `
        <td><input placeholder="Description" type="text"></td>
        <td><input placeholder="Quantity" type="number" step="any"></td>
        <td>
          <select class="measure">
            <option value="">--</option>
            <option value="m²">m²</option>
            <option value="m">m</option>
            <option value="each">each</option>
            <option value="set">set</option>
            <option value="lot">lot</option>
            <option value="hr">hr</option>
            <option value="day">day</option>
            <option value="kg">kg</option>
          </select>
        </td>
        <td><input placeholder="Price (per unit)" type="number" step="any"></td>
      `;
                return row;
            }

            // unified unit formatter
            function formatUnit(qty, unit) {
                if (!unit) return `${qty}`;
                unit = unit.toLowerCase();

                const neverPlural = ["each"];
                if (neverPlural.includes(unit)) return `${qty} ${unit}`;

                const pluralMap = {
                    "day": "days", "hr": "hrs", "hour": "hrs",
                    "lot": "lots", "set": "sets", "sheet": "sheets",
                    "m²": "m²", "m2": "m²"
                };
                const displayUnit = (qty !== 1 && pluralMap[unit]) ? pluralMap[unit] : unit;
                return `${qty} ${displayUnit}`;
            }

            function formatQuantity(qty, unit) {
                if (!unit) return qty;

                unit = unit.toLowerCase();

                const attachToQty = ["m²", "m", "kg", "hr", "day"];

                if (attachToQty.includes(unit)) {

                    const pluralMap = {
                        "day": "days", "hr": "hrs", "hour": "hrs",
                        "lot": "lots", "set": "sets", "sheet": "sheets",
                        "m²": "m²", "m2": "m²"
                    };

                    const displayUnit = (qty !== 1 && pluralMap[unit]) ? pluralMap[unit] : unit;

                    return `${qty} ${displayUnit}`;
                }

                return qty; // for each, set, lot
            }


            function formatPrice(price, unit) {
                if (!unit) return `R${price.toFixed(2)}`;

                unit = unit.toLowerCase();

                const wordUnits = ["each", "set", "lot"];

                if (wordUnits.includes(unit)) {
                    return `R${price.toFixed(2)} ${unit}`;
                }

                return `R${price.toFixed(2)}/${unit}`;
            }

            // convert file -> dataURL
            function fileToDataURL(file) {
                return new Promise((resolve, reject) => {
                    const r = new FileReader();
                    r.onload = e => resolve(e.target.result);
                    r.onerror = reject;
                    r.readAsDataURL(file);
                });
            }

            // logo preview
            // preview + consistent scaling to match PDF mm -> px
            const LOGO_WIDTH_MM = 50;
            const PX_PER_MM = 96 / 25.4; // CSS px per mm ≈ 3.7795
            logoFileInput.addEventListener('change', async () => {
                const f = logoFileInput.files && logoFileInput.files[0];
                if (!f) {
                    logoPreview.style.display = 'none';
                    logoPreview.src = '';
                    return;
                }

                const url = URL.createObjectURL(f);
                const img = new Image();
                img.onload = () => {
                    const pdfLogoWidthMM = 50; // PDF width in mm
                    const pdfScale = 2;        // approx pixels per mm
                    const previewWidth = pdfLogoWidthMM * pdfScale;
                    const previewHeight = (img.height * previewWidth) / img.width;

                    logoPreview.style.width = `${previewWidth}px`;
                    logoPreview.style.height = `${previewHeight}px`;
                    logoPreview.src = img.src;
                    logoPreview.style.display = 'block';
                };
                img.onerror = (e) => {
                    console.warn('Preview image load failed', e);
                    logoPreview.style.display = 'none';
                };
                img.src = url;
            });

            $('addRowBtn').addEventListener('click', () => { addRow(); setStatus('row added'); });
            $('autoTestBtn').addEventListener('click', () => {
                const table = $('items');
                while (table.rows.length > 1) table.deleteRow(1);
                const r1 = addRow(); const i1 = r1.querySelectorAll('input'); i1[0].value = 'Install Wall Panels'; i1[1].value = '5.76'; r1.querySelector("select").value = "m²"; i1[2].value = 290.50;
                const r2 = addRow(); const i2 = r2.querySelectorAll('input'); i2[0].value = 'Install Marble/MDF Sheet'; i2[1].value = '1'; r2.querySelector("select").value = "each"; i2[2].value = 250.00;
                setStatus('sample rows added');
            });

            $('generateBtn').addEventListener('click', async () => {
                try {
                    setStatus('building PDF template...');
                    const company = $('company').value.trim() || 'Moyo Zen Construction';
                    const companyPhone = $('companyPhone').value.trim() || '';
                    const companyEmail = $('companyEmail').value.trim() || '';
                    const dateStr = $('date').value.trim() || (new Date()).toLocaleDateString();
                    const quoteNo = $('quoteNo').value.trim() || `Q-${(new Date()).toISOString().slice(0, 10).replace(/-/g, '')}`;
                    const clientNameVal = $('clientName').value.trim() || '';
                    const clientContactVal = $('clientContact').value.trim() || '';
                    const clientAddressVal = $('clientAddress').value.trim() || '';

                    // read rows
                    const rows = document.querySelectorAll('#items tr');
                    const items = [];
                    rows.forEach((row, i) => {
                        if (i === 0) return;
                        const inputs = row.querySelectorAll('input');
                        const select = row.querySelector('select');
                        const desc = (inputs[0].value || '').trim();
                        if (!desc) return;
                        const qty = parseFloat(inputs[1].value) || 0;
                        const unit = (select && select.value) ? select.value.trim() : '';
                        // price is last input in row
                        const price = parseFloat(inputs[2].value) || 0;
                        items.push({ desc, qty, unit, price });
                    });

                    if (!items.length) { setStatus('no items — add rows or auto test'); return; }

                    // prepare logo dataURL if present
                    let logoDataUrl = null;
                    const logoFile = logoFileInput.files && logoFileInput.files[0];
                    if (logoFile) {
                        try {
                            setStatus('embedding logo...');
                            logoDataUrl = await fileToDataURL(logoFile);
                        } catch (e) {
                            console.warn('logo read failed', e);
                            showDebug('Logo read failed — continuing without logo:\n' + (e.stack || e));
                        }
                    }

                    // build table html rows & grand total
                    let grandTotal = 0;
                    let rowsHtml = '';
                    items.forEach((it, idx) => {
                        const qtyDisplay = it.unit ? formatUnit(it.qty, it.unit) : `${it.qty}`;
                        const priceDisplay = it.unit ? `${formatCurrency(it.price)}/${it.unit}` : `${formatCurrency(it.price)}`;
                        const total = it.qty * it.price;
                        grandTotal += total;
                        // alternate shading for readability
                        const bg = (idx % 2 === 1) ? ' style="background:#F7F7F7"' : '';
                        rowsHtml += `<tr${bg}>
            <td style="padding:8px">${escapeHtml(it.desc)}</td>
            <td style="padding:8px; text-align:center">${escapeHtml(qtyDisplay)}</td>
            <td style="padding:8px; text-align:right">${escapeHtml(priceDisplay)}</td>
            <td style="padding:8px; text-align:right"> ${formatCurrency(total)}</td>
          </tr>`;
                    });
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFont("times", "normal");
                    // Fixed logo position and size
                    // ===== draw logo into PDF, matching preview scaling =====
                    const MAX_LOGO_W_MM = 50; // maximum logo width in mm
                    const MAX_LOGO_H_MM = 20; // maximum logo height in mm
                    const LOGO_X_MM = 150;    // x position in mm (right side)
                    const LOGO_Y_MM = 15;     // y position in mm (top)
                    const GAP_AFTER_LOGO_MM = 6; // gap under logo before heading starts

                    let yStartAfterLogo = 45; // default fallback if logo not present or fails

                    if (logoDataUrl) {
                        try {
                            // load image into <img> to read natural size and handle SVG->PNG if needed
                            const img = new Image();
                            await new Promise((res, rej) => {
                                img.onload = res;
                                img.onerror = rej;
                                img.src = logoDataUrl;
                            });

                            // if the source is an SVG (data: or file), convert it to PNG on a canvas for jsPDF
                            let dataForPdf = logoDataUrl;
                            if (img.src.startsWith('data:image/svg+xml') || /\.svg$/i.test(img.src)) {
                                const canvas = document.createElement('canvas');
                                // use natural size or constrain to something reasonable to keep quality
                                canvas.width = img.naturalWidth || 800;
                                canvas.height = img.naturalHeight || 200;
                                const ctx = canvas.getContext('2d');
                                // white background (optional)
                                ctx.fillStyle = '#ffffff';
                                ctx.fillRect(0, 0, canvas.width, canvas.height);
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                                dataForPdf = canvas.toDataURL('image/png');
                            }

                            // natural pixel dimensions
                            const natW = img.naturalWidth || img.width;
                            const natH = img.naturalHeight || img.height;

                            // 1) target width = MAX_LOGO_W_MM, compute height to keep aspect ratio
                            let logoWmm = MAX_LOGO_W_MM;
                            let logoHmm = (natH * logoWmm) / natW;

                            // 2) if height exceeds max, scale down to fit max height
                            if (logoHmm > MAX_LOGO_H_MM) {
                                const s = MAX_LOGO_H_MM / logoHmm;
                                logoWmm = logoWmm * s;
                                logoHmm = logoHmm * s;
                            }

                            // 3) Prevent upscaling above the image's "native size in mm"
                            // approximate native mm size from pixels using 96 DPI (CSS) => px -> mm: px * 25.4 / 96
                            const PX_TO_MM = 25.4 / 96;
                            const nativeWmm = natW * PX_TO_MM;
                            if (logoWmm > nativeWmm) {
                                const s2 = nativeWmm / logoWmm;
                                logoWmm = logoWmm * s2;
                                logoHmm = logoHmm * s2;
                            }

                            // detect image type for jsPDF addImage
                            let imgType = 'PNG';
                            if (dataForPdf.startsWith('data:image/jpeg') || dataForPdf.startsWith('data:image/jpg')) imgType = 'JPEG';
                            else if (dataForPdf.startsWith('data:image/png')) imgType = 'PNG';

                            // finally, draw the image into the PDF
                            doc.addImage(dataForPdf, imgType, LOGO_X_MM, LOGO_Y_MM, logoWmm, logoHmm);

                            // compute a safe start y for the rest of the header (logo bottom + gap)
                            yStartAfterLogo = Math.max(45, LOGO_Y_MM + logoHmm + GAP_AFTER_LOGO_MM);
                        } catch (e) {
                            console.warn('PDF logo draw failed — skipping logo', e);
                            showDebug && showDebug('PDF logo draw failed — continuing without logo:\n' + (e.stack || e));
                            // keep default yStartAfterLogo
                        }
                    }

                    // now use the computed yStartAfterLogo as the top for your header/body
                    let y = yStartAfterLogo;

                    // Company Name
                    doc.setFont("times", "bold");
                    doc.setFontSize(22);
                    doc.text(company, 20, y);

                    // Company contact info
                    doc.setFont("times", "italic");
                    doc.setFontSize(10);
                    doc.text(`Phone: ${companyPhone}`, 20, y + 8);
                    doc.text(`Email: ${companyEmail}`, 20, y + 14);

                    // Quote info box (right side)
                    doc.setDrawColor(200);
                    doc.setFillColor(245, 245, 245);
                    doc.rect(140, y - 6, 50, 24, "F");

                    doc.setFont(undefined, "bold");
                    doc.setFontSize(10);
                    doc.text("QUOTE", 145, y);

                    doc.setFont("times", "italic");
                    doc.text(`Date: ${dateStr}`, 145, y + 8);
                    doc.text(`No: ${quoteNo}`, 145, y + 14);

                    // 5️⃣ quote info box
                    doc.setDrawColor(200);
                    doc.setFillColor(245, 245, 245);
                    doc.rect(140, y - 6, 50, 24, "F");

                    doc.setFontSize(10);
                    doc.setFont(undefined, "bold");
                    doc.text("QUOTE", 145, y);

                    doc.setFont("times", "italic");
                    doc.text(`Date: ${dateStr}`, 145, y + 8);
                    doc.text(`No: ${quoteNo}`, 145, y + 14);

                    // 6️⃣ move y below header for next section
                    y += 28;

                    // Client info box
                    doc.setFillColor(250, 252, 255);
                    doc.rect(20, y, 170, 40, "F");

                    doc.setFont("times", "bold");
                    doc.setFontSize(13);
                    doc.text("Client Information", 25, y + 8);

                    doc.setFontSize(10);

                    // Client Name
                    doc.setFont("times", "italic");
                    doc.text("Client Name:", 25, y + 16);

                    doc.setFont(undefined, "bold");
                    doc.text(clientNameVal || "-", 70, y + 16);

                    // Contact
                    doc.setFont("times", "italic");
                    doc.text("Contact:", 25, y + 22);

                    doc.setFont(undefined, "bold");
                    doc.text(clientContactVal || "-", 70, y + 22);

                    // Address (auto wrapped)
                    doc.setFont("times", "italic");
                    doc.text("Address:", 25, y + 28);

                    doc.setFont(undefined, "bold");

                    const addressLines = doc.splitTextToSize(clientAddressVal || "-", 110);
                    doc.text(addressLines, 70, y + 28);

                    y += 40 + (addressLines.length - 1) * 6;

                    doc.setFontSize(14);
                    doc.text("Quotation", 20, y);
                    y += 6;

                    const tableRows = [];
                    grandTotal = 0;

                    items.forEach(item => {
                        const total = item.qty * item.price;
                        grandTotal += total;

                        const qtyDisplay = formatQuantity(item.qty, item.unit);
                        const priceDisplay = formatPrice(item.price, item.unit);

                        tableRows.push([
                            item.desc,
                            qtyDisplay,
                            priceDisplay,
                            `R${total.toFixed(2)}`
                        ]);
                    });

                    doc.autoTable({
                        startY: y,
                        head: [["Description", "Quantity", "Price Each", "Total"]],
                        body: tableRows,
                        theme: "grid",
                        headStyles: {
                            fillColor: [44, 62, 80],
                            textColor: 255,
                            fontSize: 11
                        },
                        styles: {
                            font: "times",
                            fontSize: 10,
                            cellPadding: 5
                        },
                        columnStyles: {
                            1: { halign: "center" },
                            2: { halign: "right" },
                            3: { halign: "right" }
                        }
                    });

                    y = doc.lastAutoTable.finalY + 8;

                    y += 4;
                    doc.setFontSize(12);
                    doc.setFont(undefined, "bold");
                    doc.text("Grand Total:", 140, y);
                    doc.text(`R${grandTotal.toFixed(2)}`, 170, y);
                    doc.setFont("times", "italic");

                    y += 12;
                    doc.setFontSize(10);
                    doc.text("Payment terms: 30 days from invoice date.", 20, y);

                    y += 10;
                    doc.text("Acceptance:", 20, y);
                    y += 6;
                    doc.text("Name: ____________________", 20, y);
                    y += 6;
                    doc.text("Signature: ____________________", 20, y);
                    y += 6;
                    doc.text("Date: ____________________", 20, y);

                    y += 10;
                    doc.text("— Generated with MoyoZen Quote Builder —", 60, y);

                    doc.save(`quote_${new Date().toISOString().slice(0, 10)}.pdf`);

                    // cleanup
                    setStatus('PDF generated — check downloads folder');

                } catch (err) {
                    console.error(err);
                    showDebug('Error while generating PDF:\n\n' + (err.stack || err));
                    setStatus('error — see debug');
                }
            });

            // small helpers
            function escapeHtml(s) {
                if (!s && s !== 0) return '';
                return String(s).replace(/[&<>"']/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]; });
            }

            addRow();
            setStatus('ready — add rows or use Auto Test, then Generate Quote');

        })();
    </script>
</body>

</html>

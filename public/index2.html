<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Quotation Builder By Moyozen — PDF</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
        :root {
            --bg: #f4f6f8;
            --card-bg: #fff;
            --accent: #2c3e50;
            --muted: #666;
            --radius: 10px;
            --gap: 12px;
            --ui-padding: 16px;
            --max-width: 920px;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: Inter, Arial, sans-serif;
            background: var(--bg);
            padding: 18px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            color: #222;
            box-sizing: border-box;
        }

        .card {
            background: var(--card-bg);
            padding: var(--ui-padding);
            border-radius: var(--radius);
            max-width: var(--max-width);
            width: 100%;
            margin: 12px auto;
            box-shadow: 0 14px 30px rgba(20, 25, 30, 0.06);
            box-sizing: border-box;
        }

        h1 {
            margin: 0 0 6px 0;
            font-size: 18px;
            color: var(--accent);
        }

        p.muted {
            margin: 0 0 10px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .row {
            display: flex;
            gap: var(--gap);
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .col {
            flex: 1 1 200px;
            min-width: 140px;
        }

        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #e6e9ee;
            font-size: 14px;
            background: #fff;
        }

        label.small {
            display: block;
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .preview-box {
            width: 100%;
            max-width: 320px;
            /* visible on mobile but scales on desktop */
            height: 110px;
            border: 1px dashed #d7dbe0;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            overflow: hidden;
            padding: 8px;
            box-sizing: border-box;
        }

        #logoPreview {
            display: none;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
            background: white;
        }

        table#items {
            width: 100%;
            margin-top: 12px;
            border-collapse: collapse;
            display: block;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #efefef;
            padding: 2px;
        }

        table#items thead th {
            background: var(--accent);
            color: white;
            padding: 10px 12px;
            text-align: left;
            font-size: 13px;
            min-width: 90px;
        }

        table#items td {
            padding: 10px 12px;
            vertical-align: middle;
            border-bottom: 1px solid #f4f4f4;
            font-size: 14px;
            white-space: nowrap;
        }

        table#items input {
            margin: 0;
            font-size: 14px;
            padding: 8px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .controls button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            min-width: 120px;
        }

        .controls button.secondary {
            background: #f4f6f8;
            color: var(--accent);
            border: 1px solid #e6e9ee;
        }

        .status {
            margin-top: 12px;
            font-size: 13px;
            color: var(--muted);
        }

        .debug {
            font-family: monospace;
            white-space: pre-wrap;
            margin-top: 8px;
            background: #fafafa;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #eee;
            display: none;
        }

        /* mobile-first behaviour */
        @media (max-width:640px) {
            body {
                padding: 12px;
            }

            .card {
                padding: 14px;
                margin: 8px;
            }

            .controls button {
                width: 100%;
                min-width: 0;
            }

            table#items td,
            table#items thead th {
                white-space: normal;
                font-size: 14px;
            }

            .preview-box {
                max-width: 100%;
                height: 90px;
            }

            input[type="text"],
            select {
                padding: 12px;
                font-size: 15px;
            }

            .row {
                gap: 10px;
            }

            .col {
                min-width: 100%;
            }
        }

        /* slightly larger screen polish */
        @media (min-width:641px) and (max-width:1024px) {
            .controls button {
                flex: 1;
            }

            table#items td {
                font-size: 13px;
            }

            .preview-box {
                max-width: 280px;
            }
        }

        /* focus accessibility */
        input:focus,
        select:focus,
        button:focus {
            outline: 3px solid rgba(44, 62, 80, 0.12);
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="card" role="main">
        <h1>Build your Quotation</h1>
        <p class="muted">Fill in the form and tap <strong>Generate Quote</strong> to create PDF.</p>

        <div class="row" style="margin-bottom:8px">
            <div class="col"><input id="company" type="text" placeholder="Company name" value="Moyo Zen Construction" />
            </div>
            <div style="width:220px"><input id="date" type="text" placeholder="Date (optional - auto generated)" />
            </div>
            <div style="width:220px"><input id="quoteNo" type="text" placeholder="Quote No (optional)" /></div>
        </div>

        <div class="row" style="margin-top:6px">
            <div class="col">
                <label class="small">Company Phone</label>
                <input id="companyPhone" type="text" placeholder="e.g. 079 684 8598" value="079 684 8598" />
            </div>
            <div class="col">
                <label class="small">Company Email</label>
                <input id="companyEmail" type="text" placeholder="e.g. info@moyozen.co.za" value="info@moyozen.co.za" />
            </div>
        </div>

        <div style="display:flex; gap:12px; align-items:center; margin-top:12px; flex-wrap:wrap;">
            <div style="flex:1; min-width:180px;">
                <label class="small">Company Logo (optional)</label>
                <input id="logoFile" type="file" accept="image/*" />
            </div>

            <div class="preview-box" aria-hidden="false" title="Logo preview">
                <img id="logoPreview" src="" alt="logo preview" />
            </div>
        </div>

        <div style="margin-top:14px; border-radius:8px; padding:10px; background:#fbfdff; border:1px solid #eef6fb">
            <div class="row">
                <div class="col">
                    <label class="small">Client Name</label>
                    <input id="clientName" type="text" placeholder="Client full name or company" />
                </div>
                <div class="col">
                    <label class="small">Client Phone / Email</label>
                    <input id="clientContact" type="text" placeholder="Phone or email" />
                </div>
            </div>
            <div style="margin-top:8px">
                <label class="small">Client Address</label>
                <input id="clientAddress" type="text" placeholder="Client address line" />
            </div>
        </div>

        <table id="items" aria-label="items" role="table">
            <thead>
                <tr>
                    <th style="width:46%">Description</th>
                    <th style="width:12%">Quantity</th>
                    <th style="width:12%">Measure</th>
                    <th style="width:12%">Price</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="controls" style="margin-top:14px">
            <button id="addRowBtn">Add Item</button>
            <button id="autoTestBtn" class="secondary">Auto Test</button>
            <button id="generateBtn">Generate Quote</button>
        </div>

        <div id="status" class="status">Status: ready</div>
        <div id="debug" class="debug" aria-hidden="true"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
    <script>
        (async function main() {
            const statusEl = document.getElementById('status');
            const debugEl = document.getElementById('debug');
            const logoFileInput = document.getElementById('logoFile');
            const logoPreview = document.getElementById('logoPreview');
            const tbody = document.querySelector('#items tbody');
            const setStatus = t => { statusEl.textContent = 'Status: ' + t; console.log('[STATUS]', t); };
            const showDebug = t => { debugEl.style.display = 'block'; debugEl.textContent = t; console.log('[DEBUG]', t); };

            const $ = id => document.getElementById(id);
            const formatCurrency = v => `R${Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            function addRow() {
                const row = document.createElement('tr');
                row.innerHTML = `
          <td><input placeholder="Description" type="text"></td>
          <td><input placeholder="Quantity" type="number" step="any"></td>
          <td>
            <select class="measure">
              <option value="">--</option>
              <option value="m²">m²</option>
              <option value="m">m</option>
              <option value="each">each</option>
              <option value="set">set</option>
              <option value="lot">lot</option>
              <option value="hr">hr</option>
              <option value="day">day</option>
              <option value="kg">kg</option>
            </select>
          </td>
          <td><input placeholder="Price (per unit)" type="number" step="any"></td>
        `;
                tbody.appendChild(row);
                return row;
            }

            function formatQuantity(qty, unit) {
                if (!unit) return `${qty}`;
                unit = unit.toLowerCase();
                const attachToQty = ["m²", "m", "kg", "hr", "day"];
                const plurals = { "day": "days", "hr": "hrs", "hour": "hrs", "lot": "lots", "set": "sets" };
                const displayUnit = (qty !== 1 && plurals[unit]) ? plurals[unit] : unit;
                if (attachToQty.includes(unit)) return `${qty} ${displayUnit}`;
                return `${qty}`;
            }

            function formatPrice(price, unit) {
                if (!unit) return `R${price.toFixed(2)}`;
                unit = unit.toLowerCase();
                const wordUnits = ["each", "set", "lot"];
                if (wordUnits.includes(unit)) return `R${price.toFixed(2)} ${unit}`;
                return `R${price.toFixed(2)}/${unit}`;
            }

            // --- Preview scaling — exact mm -> px conversion so preview matches PDF scaling
            const LOGO_WIDTH_MM = 50;
            const PX_PER_MM = 96 / 25.4; // CSS pixels per mm (~3.78)
            logoFileInput.addEventListener('change', async () => {
                const f = logoFileInput.files && logoFileInput.files[0];
                if (!f) {
                    logoPreview.style.display = 'none';
                    logoPreview.src = '';
                    return;
                }

                const url = URL.createObjectURL(f);
                const img = new Image();
                img.onload = () => {
                    const previewWidthPx = Math.round(LOGO_WIDTH_MM * PX_PER_MM);
                    const previewHeightPx = Math.round((img.naturalHeight * previewWidthPx) / img.naturalWidth);

                    logoPreview.style.width = previewWidthPx + 'px';
                    logoPreview.style.height = previewHeightPx + 'px';
                    logoPreview.src = url;
                    logoPreview.style.display = 'block';
                };
                img.onerror = (e) => {
                    console.warn('Preview image load failed', e);
                    logoPreview.style.display = 'none';
                };
                img.src = url;
            });

            $('addRowBtn').addEventListener('click', () => { addRow(); setStatus('row added'); });
            $('autoTestBtn').addEventListener('click', () => {
                tbody.innerHTML = '';
                const r1 = addRow(); const i1 = r1.querySelectorAll('input'); i1[0].value = 'Install Wall Panels'; i1[1].value = '5.76'; r1.querySelector("select").value = "m²"; i1[2].value = 290.50;
                const r2 = addRow(); const i2 = r2.querySelectorAll('input'); i2[0].value = 'Install Marble/MDF Sheet'; i2[1].value = '1'; r2.querySelector("select").value = "each"; i2[2].value = 250.00;
                setStatus('sample rows added');
            });

            $('generateBtn').addEventListener('click', async () => {
                try {
                    setStatus('building PDF template...');
                    const company = $('company').value.trim() || 'Moyo Zen Construction';
                    const companyPhone = $('companyPhone').value.trim() || '';
                    const companyEmail = $('companyEmail').value.trim() || '';
                    const dateStr = $('date').value.trim() || (new Date()).toLocaleDateString();
                    const quoteNo = $('quoteNo').value.trim() || `Q-${(new Date()).toISOString().slice(0, 10).replace(/-/g, '')}`;
                    const clientNameVal = $('clientName').value.trim() || '';
                    const clientContactVal = $('clientContact').value.trim() || '';
                    const clientAddressVal = $('clientAddress').value.trim() || '';

                    // read rows
                    const rows = document.querySelectorAll('#items tbody tr');
                    const items = [];
                    rows.forEach((row) => {
                        const inputs = row.querySelectorAll('input');
                        const select = row.querySelector('select');
                        const desc = (inputs[0].value || '').trim();
                        if (!desc) return;
                        const qty = parseFloat(inputs[1].value) || 0;
                        const unit = (select && select.value) ? select.value.trim() : '';
                        const price = parseFloat(inputs[2].value) || 0; // after change: price at index 3
                        items.push({ desc, qty, unit, price });
                    });

                    if (!items.length) { setStatus('no items — add rows or auto test'); return; }

                    // embed logo dataURL if present
                    let logoDataUrl = null;
                    const file = logoFileInput.files && logoFileInput.files[0];
                    if (file) {
                        try {
                            setStatus('embedding logo...');
                            logoDataUrl = await new Promise((resolve, reject) => {
                                const r = new FileReader();
                                r.onload = e => resolve(e.target.result);
                                r.onerror = reject;
                                r.readAsDataURL(file);
                            });
                        } catch (e) {
                            console.warn('logo read failed', e);
                            showDebug('Logo read failed — continuing without logo:\n' + (e.stack || e));
                        }
                    }

                    // build tableRows
                    let grandTotal = 0;
                    const tableRows = [];
                    items.forEach(it => {
                        const total = it.qty * it.price;
                        grandTotal += total;
                        const qtyDisplay = formatQuantity(it.qty, it.unit);
                        const priceDisplay = formatPrice(it.price, it.unit);
                        tableRows.push([it.desc, qtyDisplay, priceDisplay, `R${total.toFixed(2)}`]);
                    });

                    // create PDF
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFont("times", "normal");

                    // ---------- logo drawing with max dims, proportionally scaled ----------
                    const MAX_LOGO_W_MM = 50;
                    const MAX_LOGO_H_MM = 20;

                    const LOGO_X_MM = 150;
                    const LOGO_Y_MM = 15;
                    const GAP_AFTER_LOGO_MM = 6;

                    let yStartAfterLogo = 45;

                    if (logoDataUrl) {
                        try {

                            const img = new Image();

                            await new Promise((res, rej) => {
                                img.onload = res;
                                img.onerror = rej;
                                img.src = logoDataUrl;
                            });

                            const natW = img.naturalWidth;
                            const natH = img.naturalHeight;

                            let scale = 1;

                            if (natW > natH) {
                                scale = MAX_LOGO_W_MM / natW;
                            } else {
                                scale = MAX_LOGO_H_MM / natH;
                            }

                            let logoW = natW * scale;
                            let logoH = natH * scale;

                            if (logoW > MAX_LOGO_W_MM) {
                                const s = MAX_LOGO_W_MM / logoW;
                                logoW *= s;
                                logoH *= s;
                            }

                            if (logoH > MAX_LOGO_H_MM) {
                                const s = MAX_LOGO_H_MM / logoH;
                                logoW *= s;
                                logoH *= s;
                            }

                            doc.addImage(logoDataUrl, "PNG", LOGO_X_MM, LOGO_Y_MM, logoW, logoH);

                            yStartAfterLogo = Math.max(
                                45,
                                LOGO_Y_MM + logoH + GAP_AFTER_LOGO_MM
                            );

                        } catch (e) {
                            console.warn("Logo failed to render", e);
                        }
                    }

                    // now use the computed yStartAfterLogo as the top for your header/body
                    let y = yStartAfterLogo;

                    // Header / company block
                    doc.setFont("times", "bold"); doc.setFontSize(22); doc.setTextColor(44, 62, 80);
                    doc.text(company, 20, y);
                    doc.setFont("times", "italic"); doc.setFontSize(10);
                    if (companyPhone) doc.text(`Phone: ${companyPhone}`, 20, y + 8);
                    if (companyEmail) doc.text(`Email: ${companyEmail}`, 20, y + 14);

                    // Quote meta box
                    const metaW = 60, metaH = 28;
                    const pageWidth = doc.internal.pageSize.getWidth();
                    const metaX = pageWidth - metaW - 20;
                    const metaY = y - 14;
                    doc.setFillColor(237, 241, 245); doc.setDrawColor(200);
                    doc.rect(metaX, metaY, metaW, metaH, "F");
                    doc.setFont("times", "bold"); doc.setFontSize(10); doc.setTextColor(20, 20, 20);
                    doc.text("QUOTE", metaX + 6, metaY + 8);
                    doc.setFont("times", "normal"); doc.setFontSize(9);
                    doc.text(`Date: ${dateStr}`, metaX + 6, metaY + 15);
                    doc.text(`No: ${quoteNo}`, metaX + 6, metaY + 22);

                    // client box
                    y = Math.max(y + 8, metaY + metaH + 6);
                    const clientBoxX = 20, clientBoxW = pageWidth - clientBoxX * 2, clientBoxY = y;
                    doc.setFillColor(251, 253, 255); doc.setDrawColor(236, 245, 252);
                    doc.rect(clientBoxX, clientBoxY, clientBoxW, 38, "F");

                    doc.setFont("times", "bold"); doc.setFontSize(12); doc.setTextColor(20, 20, 20);
                    doc.text("Client Information", clientBoxX + 6, clientBoxY + 10);

                    let lineY = clientBoxY + 18;
                    doc.setFont("times", "italic"); doc.setFontSize(10); doc.setTextColor(120);
                    doc.text("Client Name:", clientBoxX + 6, lineY);
                    doc.setFont("times", "bold"); doc.setTextColor(20, 20, 20);
                    doc.text(clientNameVal || "____________________", clientBoxX + 72, lineY);

                    lineY += 7;
                    doc.setFont("times", "italic"); doc.setTextColor(120);
                    doc.text("Contact:", clientBoxX + 6, lineY);
                    doc.setFont("times", "bold"); doc.setTextColor(20, 20, 20);
                    doc.text(clientContactVal || "____________________", clientBoxX + 72, lineY);

                    lineY += 8;
                    doc.setFont("times", "italic"); doc.setTextColor(120);
                    doc.text("Address:", clientBoxX + 6, lineY);
                    doc.setFont("times", "bold"); doc.setTextColor(20, 20, 20);
                    const addressLines = doc.splitTextToSize(clientAddressVal || "____________________", clientBoxW - (clientBoxX + 72 - clientBoxX) - 8);
                    doc.text(addressLines, clientBoxX + 72, lineY);

                    y = clientBoxY + 38 + (addressLines.length - 1) * 6 + 6;

                    // Quotation title and table using autoTable
                    doc.setFontSize(14); doc.setFont("times", "bold");
                    doc.text("Quotation", 20, y);
                    y += 6;

                    doc.autoTable({
                        startY: y,
                        head: [["Description", "Quantity", "Price Each", "Total"]],
                        body: tableRows,
                        theme: "grid",
                        headStyles: { fillColor: [44, 62, 80], textColor: 255, fontSize: 11 },
                        styles: { font: "times", fontSize: 10, cellPadding: 5 },
                        columnStyles: { 1: { halign: "center" }, 2: { halign: "right" }, 3: { halign: "right" } }
                    });

                    y = doc.lastAutoTable.finalY + 8;

                    doc.setFontSize(12); doc.setFont(undefined, "bold");
                    doc.text("Grand Total:", 140, y);
                    doc.text(`R${grandTotal.toFixed(2)}`, 170, y);
                    doc.setFont("times", "italic");

                    y += 12;
                    doc.setFontSize(10);
                    doc.text("Payment terms: 30 days from invoice date.", 20, y);

                    y += 10;
                    doc.text("Acceptance:", 20, y);
                    y += 6;
                    doc.text("Name: ____________________", 20, y);
                    y += 6;
                    doc.text("Signature: ____________________", 20, y);
                    y += 6;
                    doc.text("Date: ____________________", 20, y);

                    y += 10;
                    doc.text("— Generated with MoyoZen Quote Builder —", 60, y);

                    doc.save(`quote_${new Date().toISOString().slice(0, 10)}.pdf`);
                    setStatus('PDF generated — check downloads folder');

                } catch (err) {
                    console.error(err);
                    showDebug('Error while generating PDF:\n\n' + (err.stack || err));
                    setStatus('error — see debug');
                }
            });

            // escape helper
            function escapeHtml(s) {
                if (!s && s !== 0) return '';
                return String(s).replace(/[&<>"']/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m]; });
            }

            addRow();
            setStatus('ready — add rows or use Auto Test, then Generate Quote');
        })();
    </script>
</body>

</html>
